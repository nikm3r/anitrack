name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
