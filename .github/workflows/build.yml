name: Build
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - name: Build
        run: npx electron-builder build --linux AppImage deb --publish never
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  build-arch:
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pacman -Syu --noconfirm && pacman -S --noconfirm base-devel curl git sudo
      - name: Wait for AppImage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          URL="https://github.com/nikm3r/AniTrack/releases/download/${GITHUB_REF_NAME}/anitrack-${VERSION}.AppImage"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
            if [ "$STATUS" = "200" ]; then echo "Ready"; exit 0; fi
            echo "Attempt $i: $STATUS, waiting 20s..."
            sleep 20
          done
          exit 1
      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Build package
        run: |
          mkdir -p /tmp/arch-build
          cp PKGBUILD /tmp/arch-build/
          chown -R builder:builder /tmp/arch-build
          cd /tmp/arch-build && su builder -c "makepkg -s --noconfirm --skippgpcheck"
      - name: Upload pkg
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          files: /tmp/arch-build/*.pkg.tar.zst

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - name: Build
        run: npx electron-builder build --win nsis zip --publish never
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          files: |
            dist/*.exe
            dist/*.zip
            dist/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - name: Build
        run: npx electron-builder build --mac dmg zip --publish never
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
