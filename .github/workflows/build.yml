name: Build
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
  build-arch:
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pacman -Syu --noconfirm && pacman -S --noconfirm base-devel curl git sudo
      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Build package in temp dir
        run: |
          mkdir -p /tmp/arch-build
          cp PKGBUILD /tmp/arch-build/
          chown -R builder:builder /tmp/arch-build
          cd /tmp/arch-build && su builder -c "makepkg -s --noconfirm --skippgpcheck"
      - name: Upload pkg
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/arch-build/*.pkg.tar.zst
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
